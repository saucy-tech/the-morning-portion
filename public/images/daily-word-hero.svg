<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Sunlit morning table with an open Bible</title>
  <desc id="desc">A warm abstract editorial image for The Morning Portion.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6d4c6"/>
      <stop offset="0.45" stop-color="#f5eee6"/>
      <stop offset="1" stop-color="#dfe8f4"/>
    </linearGradient>
    <linearGradient id="table" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2c2424"/>
      <stop offset="0.55" stop-color="#5f4d48"/>
      <stop offset="1" stop-color="#2b2526"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.24" cy="0.24" r="0.42">
      <stop offset="0" stop-color="#fff7df"/>
      <stop offset="0.55" stop-color="#f2b18c" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#f2b18c" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
